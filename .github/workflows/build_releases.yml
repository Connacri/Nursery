name: Build and Release NurseryOS

permissions:
  contents: write

on:
  push:
    branches:
      - 'master'
      - 'main'
  workflow_dispatch:

jobs:
  version-bump:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run Version Increment
        id: bump
        run: |
          chmod +x increment_version.sh
          ./increment_version.sh
          VERSION=$(grep "version: " pubspec.yaml | cut -d ' ' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add pubspec.yaml
          git commit -m "chore: bump version to $VERSION [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}

  build-android:
    needs: version-bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nursery-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    needs: version-bump
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup

      - name: Build Installer with Inno Setup
        run: iscc windows/nursery_installer.iss

      - name: Upload Windows Setup
        uses: actions/upload-artifact@v4
        with:
          name: nursery-windows-setup
          path: build/windows/installer/nursery-windows-setup.exe

  create-release:
    needs: [build-android, build-windows, version-bump]
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: nursery-android-apk
          path: artifacts/

      - name: Download Windows Setup
        uses: actions/download-artifact@v4
        with:
          name: nursery-windows-setup
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-bump.outputs.new_version }}
          name: Release v${{ needs.version-bump.outputs.new_version }}
          files: |
            artifacts/app-release.apk
            artifacts/nursery-windows-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
